<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Game - Level Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 280px; background: #16213e; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.sidebar h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.sidebar h1 { font-size: 18px; color: #fff; margin-bottom: 8px; }
.section { background: #0f3460; border-radius: 8px; padding: 12px; }
.section label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
.section input[type="number"], .section input[type="text"] {
    width: 100%; padding: 6px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 13px;
}
button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #ff6b81; }
.btn-secondary { background: #533483; color: #fff; }
.btn-secondary:hover { background: #6f42c1; }
.btn-success { background: #0ea5e9; color: #fff; }
.btn-success:hover { background: #38bdf8; }
.btn-group { display: flex; gap: 8px; }
.btn-group button { flex: 1; }
.main { flex: 1; display: flex; flex-direction: column; }
.toolbar { background: #16213e; padding: 8px 16px; display: flex; gap: 8px; align-items: center; }
.toolbar .tool-btn {
    padding: 6px 12px; background: #0f3460; border: 2px solid transparent; border-radius: 6px; color: #aaa;
    cursor: pointer; font-size: 12px;
}
.toolbar .tool-btn.active { border-color: #e94560; color: #fff; background: #1a1a2e; }
.toolbar .tool-btn:hover { color: #fff; }
.toolbar .separator { width: 1px; height: 24px; background: #333; }
.canvas-container { flex: 1; overflow: auto; position: relative; }
canvas { display: block; }
.color-legend { display: flex; flex-wrap: wrap; gap: 6px; }
.color-chip { width: 24px; height: 24px; border-radius: 4px; border: 2px solid #333; cursor: pointer; }
.color-chip.active { border-color: #fff; }
.status { background: #16213e; padding: 6px 16px; font-size: 11px; color: #888; display: flex; justify-content: space-between; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #16213e; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; }
.modal h3 { margin-bottom: 12px; }
.modal textarea { width: 100%; height: 200px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; color: #fff; font-family: monospace; font-size: 12px; padding: 8px; }
.modal .btn-group { margin-top: 12px; }
</style>
</head>
<body>
<div class="sidebar">
    <h1>Level Editor</h1>
    <div class="section">
        <h2>Image Import</h2>
        <input type="file" id="imageInput" accept="image/*" style="margin: 8px 0;">
        <label>Grid Size (px per cell)</label>
        <input type="number" id="gridCellSize" value="16" min="4" max="64">
        <label>Min Arrow Length</label>
        <input type="number" id="minArrowLength" value="4" min="2" max="8">
        <label>Max Arrow Length</label>
        <input type="number" id="maxArrowLength" value="8" min="4" max="16">
        <button class="btn-primary" onclick="processImage()" style="width:100%; margin-top: 8px;">Generate from Image</button>
    </div>
    <div class="section">
        <h2>Level Info</h2>
        <label>Level ID</label>
        <input type="number" id="levelId" value="1">
        <label>Level Name</label>
        <input type="text" id="levelName" value="Level 1">
    </div>
    <div class="section">
        <h2>Path</h2>
        <label>Path Width</label>
        <input type="number" id="pathWidth" value="40" min="10" max="80">
        <label>Path Offset (grid units)</label>
        <input type="number" id="pathOffset" value="2" min="1" max="8">
        <div class="btn-group" style="margin-top: 8px;">
            <button class="btn-secondary" onclick="autoGeneratePath()">Auto Path</button>
            <button class="btn-secondary" onclick="clearPath()">Clear</button>
        </div>
    </div>
    <div class="section">
        <h2>Hole Groups</h2>
        <div id="holeGroupsList" style="font-size: 12px; color: #888;">No hole groups yet</div>
        <button class="btn-secondary" onclick="startAddHoleGroup()" style="width: 100%; margin-top: 8px;">+ Add Hole Group</button>
    </div>
    <div class="section">
        <h2>Arrows</h2>
        <div id="arrowsInfo" style="font-size: 12px; color: #888;">0 arrows</div>
    </div>
    <div class="section">
        <h2>Export</h2>
        <div class="btn-group">
            <button class="btn-success" onclick="exportJSON()">Export JSON</button>
            <button class="btn-secondary" onclick="previewJSON()">Preview</button>
        </div>
    </div>
</div>
<div class="main">
    <div class="toolbar">
        <button class="tool-btn active" data-tool="select" onclick="setTool('select')">Select</button>
        <button class="tool-btn" data-tool="path" onclick="setTool('path')">Draw Path</button>
        <button class="tool-btn" data-tool="hole" onclick="setTool('hole')">Hole</button>
        <button class="tool-btn" data-tool="erase" onclick="setTool('erase')">Erase</button>
        <div class="separator"></div>
        <span style="font-size: 12px; color: #888;">Hole Color:</span>
        <div class="color-legend" id="holeColorPicker"></div>
    </div>
    <div class="canvas-container" id="canvasContainer">
        <canvas id="mainCanvas"></canvas>
    </div>
    <div class="status">
        <span id="statusLeft">Ready</span>
        <span id="statusRight">Grid: 0x0</span>
    </div>
</div>
<div class="modal-overlay" id="previewModal">
    <div class="modal">
        <h3>JSON Preview</h3>
        <textarea id="jsonPreview" readonly></textarea>
        <div class="btn-group">
            <button class="btn-success" onclick="copyJSON()">Copy</button>
            <button class="btn-secondary" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>
<script>
const EArrowColor = {
    RED: '#FF4444', BLUE: '#3388FF', GREEN: '#44CC44',
    YELLOW: '#FFEE44', PURPLE: '#AA44FF', ORANGE: '#FF9944',
};
const ArrowDirection = { UP: 0, DOWN: 1, LEFT: 2, RIGHT: 3 };
const COLOR_VALUES = Object.values(EArrowColor);

let state = {
    tool: 'select', gridWidth: 0, gridHeight: 0, gridCellSize: 16,
    pathPoints: [], arrows: [], holeGroups: [],
    nextArrowId: 1, nextHoleGroupId: 1,
    isDrawingPath: false, isAddingHoleGroup: false,
    currentHoleGroup: null, holeGroupColor: EArrowColor.RED,
    sourceImage: null, sourceImageData: null,
    gridOffsetX: 0, gridOffsetY: 0,
    gridOriginX: 150, gridOriginY: 150,
};

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const container = document.getElementById('canvasContainer');
    const cs = state.gridCellSize;
    const ox = state.gridOffsetX;
    const oy = state.gridOffsetY;
    const margin = 150;

    const gridPixelW = state.gridWidth * cs;
    const gridPixelH = state.gridHeight * cs;

    const w = Math.max(gridPixelW + margin * 2, container.clientWidth);
    const h = Math.max(gridPixelH + margin * 2, container.clientHeight);
    canvas.width = w;
    canvas.height = h;

    state.gridOriginX = margin;
    state.gridOriginY = margin;

    draw();
}

function gridToScreen(gx, gy) {
    const cs = state.gridCellSize;
    const ox = state.gridOffsetX;
    const oy = state.gridOffsetY;
    return {
        x: (gx - ox) * cs + state.gridOriginX,
        y: (gy - oy) * cs + state.gridOriginY,
    };
}

function screenToGrid(mx, my) {
    const cs = state.gridCellSize;
    const ox = state.gridOffsetX;
    const oy = state.gridOffsetY;
    return {
        x: Math.round((mx - state.gridOriginX) / cs + ox),
        y: Math.round((my - state.gridOriginY) / cs + oy),
    };
}

function draw() {
    const cs = state.gridCellSize;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const ox = state.gridOffsetX;
    const oy = state.gridOffsetY;
    const gx = state.gridOriginX;
    const gy = state.gridOriginY;

    // Grid lines
    ctx.strokeStyle = '#2a2a4e';
    ctx.lineWidth = 0.5;
    for (let x = -ox; x <= state.gridWidth - ox; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cs + gx, gy);
        ctx.lineTo(x * cs + gx, (state.gridHeight - oy) * cs + gy);
        ctx.stroke();
    }
    for (let y = -oy; y <= state.gridHeight - oy; y++) {
        ctx.beginPath();
        ctx.moveTo(gx, y * cs + gy);
        ctx.lineTo((state.gridWidth - ox) * cs + gx, y * cs + gy);
        ctx.stroke();
    }

    // Axes (center)
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx, (state.gridHeight - oy) * cs + gy);
    ctx.moveTo(gx, gy);
    ctx.lineTo((state.gridWidth - ox) * cs + gx, gy);
    ctx.stroke();

    // Path
    if (state.pathPoints.length > 1) {
        ctx.strokeStyle = '#ADADAD';
        ctx.lineWidth = Math.max(2, state.pathWidth / (cs / 2));
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.setLineDash([12, 6]);
        ctx.beginPath();
        for (let i = 0; i < state.pathPoints.length; i++) {
            const p = gridToScreen(state.pathPoints[i][0], state.pathPoints[i][1]);
            i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);
        for (const p of state.pathPoints) {
            const s = gridToScreen(p[0], p[1]);
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Arrows
    for (const arrow of state.arrows) {
        const color = arrow.colorType;
        const allPoints = [arrow.startPos, ...arrow.offsetCoords];
        for (let i = 0; i < allPoints.length; i++) {
            const p = allPoints[i];
            const s = gridToScreen(p[0], p[1]);
            ctx.fillStyle = color;
            const size = cs * 0.6;
            ctx.fillRect(s.x - size/2, s.y - size/2, size, size);
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(s.x - size/2, s.y - size/2, size, size);
        }
        const head = arrow.startPos;
        const hs = gridToScreen(head[0], head[1]);
        ctx.fillStyle = '#fff';
        ctx.font = `${cs * 0.5}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const dirSymbols = ['\u2191', '\u2193', '\u2190', '\u2192'];
        ctx.fillText(dirSymbols[arrow.direction], hs.x, hs.y);
    }

    // Hole groups
    for (const group of state.holeGroups) {
        for (let i = 0; i < group.positions.length; i++) {
            const pos = group.positions[i];
            const s = gridToScreen(pos[0], pos[1]);
            const color = group.colorTypes[i];
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(s.x, s.y, cs * 0.4, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = color + '50';
            ctx.beginPath();
            ctx.arc(s.x, s.y, cs * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = `${cs * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`G${group.id}`, s.x, s.y);
        }
    }

    // Current hole group being edited
    if (state.currentHoleGroup) {
        for (let i = 0; i < state.currentHoleGroup.positions.length; i++) {
            const pos = state.currentHoleGroup.positions[i];
            const s = gridToScreen(pos[0], pos[1]);
            const color = state.currentHoleGroup.colorTypes[i];
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(s.x, s.y, cs * 0.4, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = color + '50';
            ctx.beginPath();
            ctx.arc(s.x, s.y, cs * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Source image overlay
    if (state.sourceImageData) {
        const img = state.sourceImageData;
        const imgW = state.gridWidth * cs;
        const imgH = state.gridHeight * cs;
        const imgX = -ox * cs + gx;
        const imgY = -oy * cs + gy;
        ctx.globalAlpha = 0.25;
        ctx.drawImage(img, imgX, imgY, imgW, imgH);
        ctx.globalAlpha = 1;
    }
}

function setTool(tool) {
    state.tool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');
    updateStatus();
}

function updateStatus() {
    document.getElementById('statusLeft').textContent = `Tool: ${state.tool} | Arrows: ${state.arrows.length} | Path: ${state.pathPoints.length} pts`;
    document.getElementById('statusRight').textContent = `Grid: ${state.gridWidth}x${state.gridHeight} | Origin: center`;
    document.getElementById('arrowsInfo').textContent = `${state.arrows.length} arrows`;
}

// ==================== IMAGE PROCESSING ====================
document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
            state.sourceImage = img;
            state.sourceImageData = img;
            processImage();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
});

function processImage() {
    const img = state.sourceImage;
    if (!img) { alert('Please upload an image first'); return; }

    const cellSize = parseInt(document.getElementById('gridCellSize').value) || 16;
    const minLen = parseInt(document.getElementById('minArrowLength').value) || 4;
    const maxLen = parseInt(document.getElementById('maxArrowLength').value) || 8;

    state.gridCellSize = cellSize;
    state.gridWidth = Math.ceil(img.width / cellSize);
    state.gridHeight = Math.ceil(img.height / cellSize);
    state.gridOffsetX = Math.floor(state.gridWidth / 2);
    state.gridOffsetY = Math.floor(state.gridHeight / 2);

    const offCanvas = document.createElement('canvas');
    offCanvas.width = state.gridWidth;
    offCanvas.height = state.gridHeight;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(img, 0, 0, state.gridWidth, state.gridHeight);
    const imageData = offCtx.getImageData(0, 0, state.gridWidth, state.gridHeight);

    const grid = Array.from({ length: state.gridHeight }, () => Array(state.gridWidth).fill(null));
    for (let y = 0; y < state.gridHeight; y++) {
        for (let x = 0; x < state.gridWidth; x++) {
            const idx = (y * state.gridWidth + x) * 4;
            const r = imageData.data[idx], g = imageData.data[idx+1], b = imageData.data[idx+2], a = imageData.data[idx+3];
            if (a < 128) continue;
            grid[y][x] = nearestColor(r, g, b);
        }
    }

    state.arrows = [];
    state.nextArrowId = 1;
    const visited = Array.from({ length: state.gridHeight }, () => Array(state.gridWidth).fill(false));

    for (let y = 0; y < state.gridHeight; y++) {
        for (let x = 0; x < state.gridWidth; x++) {
            if (!grid[y][x] || visited[y][x]) continue;
            const color = grid[y][x];
            const component = floodFill(grid, visited, x, y, color);
            const chains = generateChains(component, minLen, maxLen, color);
            state.arrows.push(...chains);
        }
    }

    resizeCanvas();
    updateStatus();
}

function nearestColor(r, g, b) {
    let minDist = Infinity, nearest = null;
    for (const hex of COLOR_VALUES) {
        const tr = parseInt(hex.slice(1,3),16), tg = parseInt(hex.slice(3,5),16), tb = parseInt(hex.slice(5,7),16);
        const dist = (r-tr)**2 + (g-tg)**2 + (b-tb)**2;
        if (dist < minDist) { minDist = dist; nearest = hex; }
    }
    return nearest;
}

function floodFill(grid, visited, startX, startY, color) {
    const cells = [];
    const stack = [[startX, startY]];
    while (stack.length > 0) {
        const [x, y] = stack.pop();
        if (x < 0 || x >= state.gridWidth || y < 0 || y >= state.gridHeight) continue;
        if (visited[y][x] || grid[y][x] !== color) continue;
        visited[y][x] = true;
        cells.push([x, y]);
        stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
    }
    return cells;
}

function generateChains(cells, minLen, maxLen, color) {
    if (cells.length === 0) return [];

    const cellSet = new Set(cells.map(c => `${c[0]},${c[1]}`));
    const arrows = [];
    const used = new Set();
    cells.sort((a, b) => a[1] * 1000 + a[0] - (b[1] * 1000 + b[0]));

    for (const startCell of cells) {
        const key = `${startCell[0]},${startCell[1]}`;
        if (used.has(key)) continue;

        const path = [startCell];
        used.add(key);
        let current = startCell;

        while (path.length < maxLen) {
            const neighbors = getUnusedNeighbors(current, cellSet, used);
            if (neighbors.length === 0) break;
            const prev = path.length > 1 ? path[path.length - 2] : null;
            let next = neighbors[0];
            if (prev) {
                const dx = current[0] - prev[0], dy = current[1] - prev[1];
                const preferred = neighbors.find(n => n[0]-current[0]===dx && n[1]-current[1]===dy);
                if (preferred) next = preferred;
            }
            path.push(next);
            used.add(`${next[0]},${next[1]}`);
            current = next;
        }

        if (path.length < minLen) continue;

        if (Math.random() < 0.5) path.reverse();

        const startPos = path[0];
        const offsetCoords = path.slice(1);
        const sx = startPos[0], sy = startPos[1];
        const ox = offsetCoords[0][0], oy = offsetCoords[0][1];
        let direction;
        if (sx === ox) {
            direction = sy > oy ? ArrowDirection.DOWN : ArrowDirection.UP;
        } else {
            direction = sx > ox ? ArrowDirection.RIGHT : ArrowDirection.LEFT;
        }

        arrows.push({
            id: state.nextArrowId++,
            startPos, offsetCoords, direction, colorType: color,
        });
    }

    return arrows;
}

function getUnusedNeighbors(cell, cellSet, used) {
    const [x, y] = cell;
    const neighbors = [];
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const key = `${x+dx},${y+dy}`;
        if (cellSet.has(key) && !used.has(key)) neighbors.push([x+dx, y+dy]);
    }
    return neighbors;
}

// ==================== AUTO PATH ====================
function autoGeneratePath() {
    const img = state.sourceImage;
    if (!img) { alert('Please upload an image first'); return; }

    const offset = parseInt(document.getElementById('pathOffset').value) || 2;

    // Build occupancy grid
    const occupied = Array.from({ length: state.gridHeight }, () => Array(state.gridWidth).fill(false));
    const offCanvas = document.createElement('canvas');
    offCanvas.width = state.gridWidth;
    offCanvas.height = state.gridHeight;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(img, 0, 0, state.gridWidth, state.gridHeight);
    const imageData = offCtx.getImageData(0, 0, state.gridWidth, state.gridHeight);

    for (let y = 0; y < state.gridHeight; y++) {
        for (let x = 0; x < state.gridWidth; x++) {
            if (imageData.data[(y * state.gridWidth + x) * 4 + 3] >= 128) {
                occupied[y][x] = true;
            }
        }
    }

    // Find bounding box of all occupied cells
    let minX = state.gridWidth, maxX = 0, minY = state.gridHeight, maxY = 0;
    for (let y = 0; y < state.gridHeight; y++) {
        for (let x = 0; x < state.gridWidth; x++) {
            if (occupied[y][x]) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
        }
    }

    if (minX > maxX) { alert('No shape found'); return; }

    // Expand by offset
    minX -= offset; minY -= offset;
    maxX += offset; maxY += offset;

    // Clamp
    minX = Math.max(0, minX); minY = Math.max(0, minY);
    maxX = Math.min(state.gridWidth - 1, maxX);
    maxY = Math.min(state.gridHeight - 1, maxY);

    // 4 corner points: top-left, top-right, bottom-right, bottom-left
    state.pathPoints = [
        [minX, minY],
        [maxX, minY],
        [maxX, maxY],
        [minX, maxY],
    ];

    draw();
    updateStatus();
}

function mooreTrace(pointSet) {
    const points = Array.from(pointSet).map(s => s.split(',').map(Number));
    if (points.length === 0) return [];

    // Find topmost-leftmost start
    let startIdx = 0;
    for (let i = 1; i < points.length; i++) {
        if (points[i][1] < points[startIdx][1] ||
            (points[i][1] === points[startIdx][1] && points[i][0] < points[startIdx][0])) {
            startIdx = i;
        }
    }

    const set = new Set(pointSet);
    const path = [];
    let current = points[startIdx];
    let dir = 0; // 0=right, 1=down, 2=left, 3=up
    const dirs = [[1,0],[0,1],[-1,0],[0,-1]];
    const startKey = `${current[0]},${current[1]}`;
    const maxIter = pointSet.size * 4;
    let iter = 0;

    while (iter < maxIter) {
        path.push([current[0], current[1]]);

        let found = false;
        for (let i = 0; i < 4; i++) {
            const checkDir = (dir + i) % 4;
            const nx = current[0] + dirs[checkDir][0];
            const ny = current[1] + dirs[checkDir][1];
            if (set.has(`${nx},${ny}`)) {
                dir = (checkDir + 3) % 4;
                current = [nx, ny];
                found = true;
                break;
            }
        }

        if (!found) break;
        if (`${current[0]},${current[1]}` === startKey && path.length > 3) break;
        iter++;
    }

    return path;
}

// ==================== INTERACTION ====================
canvas.addEventListener('mousedown', function(e) {
    const rect = canvas.getBoundingClientRect();
    const { x: gx, y: gy } = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);

    if (state.tool === 'path') {
        if (!state.isDrawingPath) {
            state.pathPoints = [];
            state.isDrawingPath = true;
        }
        state.pathPoints.push([gx, gy]);
        draw();
    } else if (state.tool === 'hole' && state.isAddingHoleGroup) {
        if (!state.currentHoleGroup) {
            state.currentHoleGroup = { id: state.nextHoleGroupId++, positions: [], colorTypes: [] };
        }
        state.currentHoleGroup.positions.push([gx, gy]);
        state.currentHoleGroup.colorTypes.push(state.holeGroupColor);
        draw();
    } else if (state.tool === 'erase') {
        for (let i = state.arrows.length - 1; i >= 0; i--) {
            const arrow = state.arrows[i];
            const allPts = [arrow.startPos, ...arrow.offsetCoords];
            if (allPts.some(p => p[0]===gx && p[1]===gy)) {
                state.arrows.splice(i, 1);
                draw();
                updateStatus();
                break;
            }
        }
    }
});

canvas.addEventListener('mousemove', function(e) {
    const rect = canvas.getBoundingClientRect();
    const { x: gx, y: gy } = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
    document.getElementById('statusRight').textContent = `Grid: (${gx}, ${gy})`;
});

// ==================== HOLE GROUPS ====================
function startAddHoleGroup() {
    state.isAddingHoleGroup = true;
    state.currentHoleGroup = null;
    setTool('hole');
    document.getElementById('statusLeft').textContent = 'Click to place holes. Click "Finish" when done.';
    const section = document.querySelector('.section:has(#holeGroupsList)');
    if (!document.getElementById('finishHoleBtn')) {
        const btn = document.createElement('button');
        btn.id = 'finishHoleBtn';
        btn.className = 'btn-success';
        btn.textContent = 'Finish Hole Group';
        btn.style.width = '100%';
        btn.style.marginTop = '8px';
        btn.onclick = finishHoleGroup;
        section.appendChild(btn);
    }
}

function finishHoleGroup() {
    if (state.currentHoleGroup && state.currentHoleGroup.positions.length > 0) {
        state.holeGroups.push(state.currentHoleGroup);
        updateHoleGroupsList();
    }
    state.isAddingHoleGroup = false;
    state.currentHoleGroup = null;
    setTool('select');
    document.getElementById('statusLeft').textContent = 'Ready';
    document.getElementById('finishHoleBtn')?.remove();
    draw();
}

function updateHoleGroupsList() {
    const el = document.getElementById('holeGroupsList');
    if (state.holeGroups.length === 0) { el.textContent = 'No hole groups yet'; return; }
    el.innerHTML = state.holeGroups.map(g =>
        `<div style="margin:4px 0;padding:4px;background:#1a1a2e;border-radius:4px;">
            Group ${g.id}: ${g.positions.length} holes
            <span style="color:${g.colorTypes[0]}">\u25CF</span>
            <button onclick="removeHoleGroup(${g.id})" style="float:right;background:none;border:none;color:#e94560;cursor:pointer;">X</button>
        </div>`
    ).join('');
}

function removeHoleGroup(id) {
    state.holeGroups = state.holeGroups.filter(g => g.id !== id);
    updateHoleGroupsList();
    draw();
}

(function initHoleColorPicker() {
    const el = document.getElementById('holeColorPicker');
    for (const color of COLOR_VALUES) {
        const chip = document.createElement('div');
        chip.className = 'color-chip';
        chip.style.backgroundColor = color;
        chip.onclick = () => {
            state.holeGroupColor = color;
            document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
        };
        if (color === state.holeGroupColor) chip.classList.add('active');
        el.appendChild(chip);
    }
})();

// ==================== EXPORT ====================
function toGameCoords(gx, gy) {
    return [gx - state.gridOffsetX, (state.gridHeight - 1 - gy) - state.gridOffsetY];
}

function buildLevelConfig() {
    const arrows = state.arrows.map(a => ({
        id: a.id,
        startPos: toGameCoords(a.startPos[0], a.startPos[1]),
        offsetCoords: a.offsetCoords.map(p => toGameCoords(p[0], p[1])),
        direction: a.direction,
        colorType: a.colorType,
    }));

    const holes = state.holeGroups.map(g => ({
        id: g.id,
        positions: g.positions.map(p => toGameCoords(p[0], p[1])),
        colorTypes: g.colorTypes,
    }));

    const pathPoints = state.pathPoints.map(p => toGameCoords(p[0], p[1]));

    return {
        levelId: parseInt(document.getElementById('levelId').value) || 1,
        levelName: document.getElementById('levelName').value || 'Level 1',
        mapWidth: 750,
        mapHeight: 1334,
        path: {
            pathPoints,
            pathWidth: parseInt(document.getElementById('pathWidth').value) || 40,
        },
        arrows,
        holes,
    };
}

function exportJSON() {
    const config = buildLevelConfig();
    const json = JSON.stringify(config, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `level_${config.levelId}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function previewJSON() {
    const config = buildLevelConfig();
    document.getElementById('jsonPreview').value = JSON.stringify(config, null, 2);
    document.getElementById('previewModal').classList.add('show');
}

function copyJSON() {
    const textarea = document.getElementById('jsonPreview');
    textarea.select();
    document.execCommand('copy');
    alert('Copied!');
}

function closeModal() {
    document.getElementById('previewModal').classList.remove('show');
}

function clearPath() {
    state.pathPoints = [];
    state.isDrawingPath = false;
    draw();
    updateStatus();
}

resizeCanvas();
updateStatus();
</script>
